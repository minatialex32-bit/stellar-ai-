<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarAI - Oroscopo Generativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Corretto min-height e aggiunto un font più leggibile */
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%); 
            color: white; 
            min-height: 100vh; 
            margin: 0;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10 font-sans flex items-center justify-center">

    <div class="max-w-md w-full text-center">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-300">
            StellarAI
        </h1>
        <p class="text-gray-400 mb-8 text-sm tracking-widest uppercase">Il tuo destino, riscritto ogni giorno.</p>

        <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-purple-300 mb-3 text-left font-bold">Data di Nascita</label>
                <input type="date" id="birthDate" class="w-full bg-slate-900 border border-purple-500/50 rounded-xl p-4 text-white outline-none focus:ring-2 ring-purple-400 transition-all">
            </div>
            
            <button onclick="generaOroscopo()" id="btnGo" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:scale-105 active:scale-95 transition-all text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-wider">
                Interroga il Cosmo
            </button>
        </div>

        <div id="loader" class="hidden mt-12 fade-in">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-400 mx-auto"></div>
            <p class="text-sm mt-4 text-purple-300 italic">Allineando i pianeti per te...</p>
        </div>

        <div id="result" class="hidden mt-8 text-left fade-in">
            <div class="glass p-8 rounded-3xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="zodiacSign" class="text-3xl font-bold text-purple-300"></h2>
                    <span class="text-[2rem]" id="zodiacEmoji">✨</span>
                </div>
                <div id="horoscopeText" class="text-gray-200 leading-relaxed text-lg space-y-4">
                    </div>
            </div>
            <button onclick="window.location.reload()" class="mt-6 text-sm text-gray-400 hover:text-white transition-colors w-full text-center tracking-widest uppercase">
                ⟳ Calcola una nuova rotta
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CONFIGURAZIONE - La tua chiave è già qui
        const API_KEY = "AIzaSyDGNlsHIUe7LkkwZKyy9sZIJc8EkVRyQLA"; 

        window.generaOroscopo = async () => {
            const birthDate = document.getElementById('birthDate').value;
            if (!birthDate) return alert("Inserisci la tua data di nascita per procedere!");

            const btn = document.getElementById('btnGo');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const textTarget = document.getElementById('horoscopeText');

            // UI Feedback
            btn.parentElement.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const oggi = new Date().toLocaleDateString('it-IT');

                // PROMPT POTENZIATO
                const prompt = `
                    Dati: Utente nato il ${birthDate}. Oggi è il ${oggi}.
                    Ruolo: Sei un astrologo moderno, brillante e un po' ribelle.
                    Compiti:
                    1. Identifica il segno zodiacale.
                    2. Scrivi un oroscopo quotidiano UNICO. Non essere ripetitivo.
                    3. Usa tre sezioni con titoli accattivanti:
                       - "Vibe Astrale": (L'energia generale di oggi)
                       - "Attento a...": (Un consiglio pratico su cosa evitare)
                       - "Hack Cosmico": (Un'azione insolita da fare oggi per attirare fortuna)
                    4. Stile: Evita i cliché. Sii diretto, usa un linguaggio fresco (tipo social media) ma profondo.
                    5. Rispondi in Italiano.
                `;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                let text = response.text();

                // Formattazione base per rendere i titoli in grassetto
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-purple-300">$1</strong>');
                
                document.getElementById('zodiacSign').innerText = "Il tuo Destino";
                textTarget.innerHTML = text.replace(/\n/g, '<br>');
                
                loader.classList.add('hidden');
                resultDiv.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Le interferenze spaziali sono troppo forti. Controlla la connessione o la tua API Key!");
                btn.parentElement.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
